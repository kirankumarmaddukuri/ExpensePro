spring:
  application:
    name: expense-tracker-api
  
  profiles:
    active: postgres-local

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
        batch_size: 20
        order_inserts: true
        order_updates: true

---
# =============================================
# POSTGRESQL LOCAL PROFILE
# =============================================
spring:
  config:
    activate:
      on-profile: postgres-local
      
  datasource:
    url: jdbc:postgresql://localhost:5432/expensedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
            
  liquibase:
    enabled: false

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
    com.expensetracker: INFO
