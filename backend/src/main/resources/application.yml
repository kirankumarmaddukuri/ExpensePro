application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}

spring:
  application:
    name: expense-tracker-api
  
  profiles:
    active: postgres-local

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
        batch_size: 20
        order_inserts: true
        order_updates: true

---
# =============================================
# POSTGRESQL LOCAL PROFILE
# =============================================
spring:
  config:
    activate:
      on-profile: postgres-local
      
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:expensedb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
            
  liquibase:
    enabled: false

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
    com.expensetracker: INFO
